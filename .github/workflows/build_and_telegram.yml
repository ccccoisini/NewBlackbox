name: Build and Upload Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      
      # 移除了 jq 安装步骤，因为只有发送 Telegram 时才需要解析 JSON

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || true

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 编译步骤保持不变
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Build Bcore AAR (Debug & Release)
        run: ./gradlew :Bcore:assembleRelease :Bcore:assembleDebug

      # 使用 upload-artifact 插件上传产物，方便在 GitHub 页面下载
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: App-APKs
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          retention-days: 7  # 可选：设置文件保留天数

      - name: Upload Bcore AARs
        uses: actions/upload-artifact@v4
        with:
          name: Bcore-AARs
          path: Bcore/build/outputs/aar/*.aar
          retention-days: 7
